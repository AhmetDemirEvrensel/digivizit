name: digivizit
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  mobile_scanner: ^7.1.4
  pinput: ^6.0.1
  mobx: ^2.6.0
  flutter_mobx: ^2.3.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  get: ^4.7.2
  shared_preferences: ^2.2.3
  easy_localization: ^3.0.8
  page_transition: ^2.2.2
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.9.3
  intl: ^0.20.2
  permission_handler: ^11.3.1
  dio: ^5.5.0+1
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  logger: ^2.5.0
  reactive_forms: ^18.1.1
  provider: ^6.1.5+1
  palette_generator: ^0.3.3+7
  whatsapp_unilink: ^2.1.0
  share_plus: ^12.0.1
  flutter_animate: ^4.5.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.10.1
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  mobx_codegen: ^2.7.5


flutter:
  config:
    enable-swift-package-manager: false

  uses-material-design: true

  assets:
    - assets/images/
    - assets/maptheme/
    - assets/icons/
    - assets/animations/
    - assets/images/
    - assets/translations/
    - assets/fonts/



  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_24pt-Thin.ttf
          weight: 100
        - asset: assets/fonts/Inter_24pt-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Inter_24pt-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter_24pt-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Inter_24pt-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter_24pt-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Inter_24pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_24pt-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter_24pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_24pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Inter_24pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_24pt-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Inter_24pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter_24pt-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Inter_24pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter_24pt-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Inter_24pt-Black.ttf
          weight: 900
        - asset: assets/fonts/Inter_24pt-BlackItalic.ttf
          weight: 900
          style: italic
